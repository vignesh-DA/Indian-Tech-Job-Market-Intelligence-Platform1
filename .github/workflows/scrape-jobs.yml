name: Scrape Jobs To Neon

on:
  workflow_dispatch:
    inputs:
      scrape_roles:
        description: "Comma-separated roles (optional, default from code)"
        required: false
        default: ""
      scrape_locations:
        description: "Comma-separated locations (optional, default from code)"
        required: false
        default: ""
      max_results_per_role:
        description: "Max jobs per role-location combination"
        required: false
        default: "40"
  schedule:
    - cron: "30 20 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper and persist to Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          SCRAPE_ROLES: ${{ github.event.inputs.scrape_roles }}
          SCRAPE_LOCATIONS: ${{ github.event.inputs.scrape_locations }}
          SCRAPE_MAX_RESULTS_PER_ROLE: ${{ github.event.inputs.max_results_per_role || '40' }}
        run: python scripts/run_scrape_job.py
